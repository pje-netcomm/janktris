<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janktris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <h1>Janktris</h1>
    <div id="game-area">
      <div id="arena-shade"></div>
      <canvas id="arena" width="400" height="800"></canvas>
      <div id="ui">
        <div id="score-label">Score: <span id="score">0</span> | High: <span id="highscore">0</span></div>
        <div id="version"></div>
        <div id="controls">
          <div class="controls-title">Controls</div>
          <div class="controls-grid">
            <div class="control-key">←/→</div>
            <div class="control-desc">Move</div>
            
            <div class="control-key">↑</div>
            <div class="control-desc">Rotate Right</div>
            
            <div class="control-key">↓</div>
            <div class="control-desc">Drop Faster</div>
            
            <div class="control-key">A</div>
            <div class="control-desc">Rotate Left</div>
            
            <div class="control-key">D</div>
            <div class="control-desc">Rotate Right</div>
            
            <div class="control-key">Enter</div>
            <div class="control-desc">Hard Drop</div>
            
            <div class="control-key">Space</div>
            <div class="control-desc">Pause/Start</div>
          </div>
        </div>
      </div>
    </div>
    <div id="messages"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div id="modal-buttons"></div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
